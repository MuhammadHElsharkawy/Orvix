@if (comment) {
<section class="mb-3">
  <div class="flex items-center gap-2">
    <div>
      <img class="w-8 h8 rounded-full" [src]="comment.commentCreator.photo" alt="" />
    </div>
    <div class="relative inline-block max-w-full rounded-2xl bg-[#f0f2f5] px-3 py-2">
      <div class="">
        <p class="text-xs font-bold text-slate-900">{{ comment.commentCreator.name }}</p>
        <p class="text-xs text-slate-500">
          <span>{{ comment.commentCreator.username }}</span> .
          <span>{{ comment.createdAt | date }}</span>
        </p>
      </div>
      <p class="mt-1 whitespace-pre-wrap text-sm text-slate-800" [class]="{
            'hidden': iseditCommentFormOpen,
            'block': !iseditCommentFormOpen
          }">{{ comment.content }}</p>
      <div class="mt-2 items-center gap-2" [class]="{
            'hidden': !iseditCommentFormOpen,
            'flex': iseditCommentFormOpen
          }">
        <input type="text" class="w-full rounded-full border border-slate-300 bg-white px-3 py-1.5 text-sm"
          [formControl]="updateCommentControl">
        <button (click)="saveCommentClick(comment._id)" [disabled]="isLoading || !updateCommentControl.valid"
          class="rounded-full bg-[#1877f2] px-3 py-1.5 text-xs font-bold text-white hover:bg-[#166fe5] disabled:opacity-60 disabled:cursor-no-drop">Save</button>
        <button (click)="closeEditCommentForm()"
          class="rounded-full border border-slate-300 bg-white px-3 py-1.5 text-xs font-bold text-slate-700 hover:bg-slate-100">Cancel</button>
      </div>
    </div>
    @if (comment.commentCreator._id == myId) {
    <div #list class="ms-auto relative">
      <button (click)="toggleList()" class=" transition hover:bg-slate-300 p-2 rounded-full cursor-pointer ">
        <span>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-ellipsis-icon lucide-ellipsis">
            <circle cx="12" cy="12" r="1" />
            <circle cx="19" cy="12" r="1" />
            <circle cx="5" cy="12" r="1" />
          </svg>
        </span>
      </button>
      <div
        class="absolute right-0.5 top-8 z-20 mt-2 w-32 overflow-hidden rounded-xl border border-slate-200 bg-white py-1 shadow-lg"
        [class.hidden]="!isListOpen">
        <ul class="text-sm text-body font-medium">
          <li>
            <button (click)="editCommentClick()"
              class="cursor-pointer flex w-full items-center gap-2 px-3 py-2 text-left text-xs font-semibold text-slate-700 hover:bg-slate-50">
              <span>
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  class="lucide lucide-pencil-icon lucide-pencil">
                  <path
                    d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z" />
                  <path d="m15 5 4 4" />
                </svg>
              </span>
              <span>Edit</span>
            </button>
          </li>
          <li>
            <button (click)="deleteComment(comment._id)"
              class="cursor-pointer flex w-full items-center gap-2 px-3 py-2 text-left text-xs font-semibold text-rose-600 hover:bg-rose-50">
              <span>
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  class="lucide lucide-trash2-icon lucide-trash-2">
                  <path d="M10 11v6" />
                  <path d="M14 11v6" />
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                  <path d="M3 6h18" />
                  <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                </svg>
              </span>
              <span>Delete</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
    }
  </div>
</section>
}
