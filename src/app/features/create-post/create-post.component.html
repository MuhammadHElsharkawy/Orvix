  </div>
  <div class="border-t border-slate-400 py-3">
    <button
    (click)="$event.stopPropagation(); toggleDropdown()"
      class="flex items-center justify-center w-full gap-3 text-white bg-brand box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none cursor-pointer"
    >
      <span>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-badge-plus-icon lucide-badge-plus"
        >
          <path
            d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"
          />
          <line x1="12" x2="12" y1="8" y2="16" />
          <line x1="8" x2="16" y1="12" y2="12" />
        </svg>
      </span>
      <span>Add post</span>
    </button>
    <div
      #Model
      (click)="isModelOpen = false"
      (click)="clearInputs()"
      class="bg-slate-950/20 backdrop-blur-xs overflow-y-auto overflow-x-hidden fixed h-full top-0 right-0 left-0 z-100 justify-center items-center w-full md:inset-0 max-h-full"
      [class]="{
        'flex': isModelOpen,
        'hidden': !isModelOpen
      }"
    >
      <div class="relative p-4 w-full max-w-2xl max-h-full"
      (click)="$event.stopPropagation()">
        <div
          class="relative bg-neutral-primary-soft border border-default rounded-base shadow-sm p-4 md:p-6"
        >
          <div class="flex items-center justify-between border-b border-default pb-4 md:pb-5">
            <h3 class="text-lg font-medium text-heading">Add post</h3>
            <button
              type="button"
              class="text-body bg-transparent hover:bg-neutral-tertiary hover:text-heading rounded-base text-sm w-9 h-9 ms-auto inline-flex justify-center items-center"
            >
              <svg
                class="w-5 h-5"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18 17.94 6M18 18 6.06 6"
                />
              </svg>
              <span class="sr-only">Close modal</span>
            </button>
          </div>
          <form (submit)="createPost($event)">
            <div class="space-y-4 md:space-y-6 py-4 md:py-6">
              <textarea
                [formControl]="postText"
                rows="2"
                [placeholder]="
                  profile?.name
                    ? 'What\'s on your mind, ' + profile?.name + '?'
                    : 'What\'s on your mind?'
                "
                class="w-full m-0 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-[17px] leading-relaxed text-slate-800 outline-none transition focus:border-[#1877f2] focus:bg-white"
              ></textarea>
              <div>
                <label
                  class="inline-flex gap-2 py-2 px-3 hover:bg-slate-100 transition rounded-[8px] cursor-pointer"
                >
                  <span class="text-emerald-600">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="lucide lucide-image-icon lucide-image"
                    >
                      <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                      <circle cx="9" cy="9" r="2" />
                      <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                    </svg>
                  </span>
                  <span class="text-slate-600 text-sm font-semibold">Photo/video</span>
                  <input (change)="getPostImg($event)" type="file" class="hidden" />
                </label>
              </div>
              <div>
                <img [src]="imagePreview" alt="" />
              </div>
            </div>
            <div class="flex items-center border-t border-default space-x-4 pt-4 md:pt-5">
              <button
              [disabled]="!postText.valid"
                type="submit"
                class="cursor-pointer flex items-center gap-2 text-white bg-brand box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none disabled:cursor-not-allowed disabled:bg-[#9ec5ff] disabled:opacity-100"
              >
                <span>
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-send-icon lucide-send"
                  >
                    <path
                      d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"
                    />
                    <path d="m21.854 2.147-10.94 10.939" />
                  </svg>
                </span>
                <span>Post</span>
              </button>
              <button
                (click)="clearInputs()"
                (click)="toggleDropdown()"
                type="button"
                class="cursor-pointer flex items-center gap-2 text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading focus:ring-4 focus:ring-neutral-tertiary shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none"
              >
                <span>
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-circle-x-icon lucide-circle-x"
                  >
                    <circle cx="12" cy="12" r="10" />
                    <path d="m15 9-6 6" />
                    <path d="m9 9 6 6" />
                  </svg>
                </span>
                <span>Cancel</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
